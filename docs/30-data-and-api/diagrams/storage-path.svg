<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 340" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#495057"/></marker>
  </defs>
  <rect x="0" y="0" width="640" height="340" fill="#f7f8fa"/>
  <text x="320" y="28" text-anchor="middle" font-size="16" font-weight="700" fill="#1b1f24">Storage path scheme</text>

  <!-- bucket -->
  <rect x="24" y="130" width="150" height="70" rx="10" fill="#eafaf1" stroke="#2f9e6f" stroke-width="2"/>
  <text x="99" y="160" text-anchor="middle" font-size="12.5" font-weight="700" fill="#177d54">bucket</text>
  <text x="99" y="178" text-anchor="middle" font-size="11.5" fill="#2f6b4b">penelope-files</text>

  <!-- folders -->
  <rect x="230" y="60" width="180" height="60" rx="10" fill="#fff3d6" stroke="#c99a2b" stroke-width="2"/>
  <text x="320" y="86" text-anchor="middle" font-size="12.5" font-weight="600" fill="#7a5b12">folder: PEN1LOPE</text>
  <text x="320" y="103" text-anchor="middle" font-size="10.5" fill="#9a7b2b">(room code)</text>

  <rect x="230" y="210" width="180" height="60" rx="10" fill="#fff3d6" stroke="#c99a2b" stroke-width="2"/>
  <text x="320" y="236" text-anchor="middle" font-size="12.5" font-weight="600" fill="#7a5b12">folder: ABCD1234</text>
  <text x="320" y="253" text-anchor="middle" font-size="10.5" fill="#9a7b2b">(another code)</text>

  <!-- objects -->
  <g font-size="11.5" text-anchor="middle" fill="#1b3a5b">
    <rect x="456" y="36" width="168" height="40" rx="8" fill="#e7f0fe" stroke="#2b6cb0"/><text x="540" y="60">a1b2…-report.pdf</text>
    <rect x="456" y="90" width="168" height="40" rx="8" fill="#e7f0fe" stroke="#2b6cb0"/><text x="540" y="114">c3d4…-photo.jpg</text>
    <rect x="456" y="220" width="168" height="40" rx="8" fill="#e7f0fe" stroke="#2b6cb0"/><text x="540" y="244">e5f6…-notes.txt</text>
  </g>

  <!-- arrows -->
  <path d="M174,158 C200,150 205,96 228,90" fill="none" stroke="#495057" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M174,172 C200,185 205,236 228,240" fill="none" stroke="#495057" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M410,80 C432,70 440,58 454,56" fill="none" stroke="#495057" stroke-width="1.4" marker-end="url(#ah)"/>
  <path d="M410,96 C432,104 440,108 454,110" fill="none" stroke="#495057" stroke-width="1.4" marker-end="url(#ah)"/>
  <path d="M410,240 C432,240 440,240 454,240" fill="none" stroke="#495057" stroke-width="1.4" marker-end="url(#ah)"/>

  <text x="320" y="312" text-anchor="middle" font-size="11.5" fill="#5b6470">path = &lt;roomCode&gt; / &lt;itemId&gt;-&lt;originalName&gt;  ·  first segment (code) enforced by Storage RLS</text>
</svg>
