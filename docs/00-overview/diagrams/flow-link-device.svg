<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 530" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#495057"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="530" fill="#f7f8fa"/>
  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1b1f24">Flow 3 — Link a second device</text>

  <g stroke="#c3c8cf" stroke-width="1.3" stroke-dasharray="4 4">
    <line x1="80" y1="118" x2="80" y2="496"/>
    <line x1="270" y1="118" x2="270" y2="496"/>
    <line x1="470" y1="118" x2="470" y2="496"/>
    <line x1="670" y1="118" x2="670" y2="496"/>
    <line x1="868" y1="118" x2="868" y2="496"/>
  </g>

  <g font-size="11.5" text-anchor="middle" fill="#1b1f24">
    <rect x="35" y="72" width="90" height="46" rx="9" fill="#fde7cf" stroke="#c2792b"/><text x="80" y="100" font-weight="600">👤 User</text>
    <rect x="195" y="72" width="150" height="46" rx="9" fill="#e7f0fe" stroke="#2b6cb0"/><text x="270" y="94" font-weight="600">📱 Phone</text><text x="270" y="110" font-size="10">has code</text>
    <rect x="390" y="72" width="160" height="46" rx="9" fill="#e7f0fe" stroke="#2b6cb0"/><text x="470" y="94" font-weight="600">💻 Laptop</text><text x="470" y="110" font-size="10">new visit</text>
    <rect x="595" y="72" width="150" height="46" rx="9" fill="#ffe9c9" stroke="#c2792b"/><text x="670" y="100" font-weight="600">localStorage</text>
    <rect x="793" y="72" width="150" height="46" rx="9" fill="#d7f5e7" stroke="#2f9e6f"/><text x="868" y="100" font-weight="600">Supabase</text>
  </g>

  <!-- note over phone -->
  <rect x="200" y="128" width="150" height="28" rx="6" fill="#fff8e1" stroke="#f0c96b"/>
  <text x="275" y="146" text-anchor="middle" font-size="10.5" fill="#7a5b12">already has "PEN1LOPE"</text>

  <g font-size="11" fill="#343a40" text-anchor="middle">
    <line x1="80" y1="186" x2="468" y2="186" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="274" y="180">open the site</text>
    <line x1="470" y1="222" x2="668" y2="222" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="569" y="216">read room code</text>
    <line x1="670" y1="258" x2="472" y2="258" stroke="#868e96" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ah)"/><text x="571" y="252" fill="#868e96">none found</text>

    <path d="M470,288 h70 v20 h-68" fill="none" stroke="#495057" stroke-width="1.6" marker-end="url(#ah)"/>
    <text x="548" y="294" text-anchor="start" font-size="10.5">generate 8-char code, but…</text>

    <line x1="80" y1="340" x2="468" y2="340" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="274" y="334">type the phone's code "PEN1LOPE"</text>
    <line x1="470" y1="378" x2="668" y2="378" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="569" y="372">save "PEN1LOPE"</text>
    <line x1="470" y1="414" x2="866" y2="414" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="668" y="408">query items where code = "PEN1LOPE"</text>
    <line x1="868" y1="450" x2="472" y2="450" stroke="#868e96" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ah)"/><text x="670" y="444" fill="#868e96">the shared stream</text>
  </g>

  <rect x="185" y="474" width="370" height="30" rx="6" fill="#eafaf1" stroke="#3ecf8e"/>
  <text x="370" y="493" text-anchor="middle" font-size="11" fill="#177d54">both devices now read/write the same items</text>
</svg>
