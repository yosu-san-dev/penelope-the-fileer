<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 560" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#495057"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="560" fill="#f7f8fa"/>
  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1b1f24">Flow 4 — Expiry &amp; cleanup (hybrid)</text>

  <g stroke="#c3c8cf" stroke-width="1.3" stroke-dasharray="4 4">
    <line x1="90" y1="118" x2="90" y2="528"/>
    <line x1="280" y1="118" x2="280" y2="528"/>
    <line x1="480" y1="118" x2="480" y2="528"/>
    <line x1="670" y1="118" x2="670" y2="528"/>
    <line x1="870" y1="118" x2="870" y2="528"/>
  </g>

  <g font-size="11.5" text-anchor="middle" fill="#1b1f24">
    <rect x="35" y="72" width="110" height="46" rx="9" fill="#f4fbf7" stroke="#2f9e6f"/><text x="90" y="94" font-weight="600">pg_cron</text><text x="90" y="110" font-size="10">schedule</text>
    <rect x="210" y="72" width="140" height="46" rx="9" fill="#d7f5e7" stroke="#2f9e6f"/><text x="280" y="100" font-weight="600">Edge Function</text>
    <rect x="405" y="72" width="150" height="46" rx="9" fill="#d7f5e7" stroke="#2f9e6f"/><text x="480" y="100" font-weight="600">Postgres (items)</text>
    <rect x="595" y="72" width="150" height="46" rx="9" fill="#d7f5e7" stroke="#2f9e6f"/><text x="670" y="100" font-weight="600">Supabase Storage</text>
    <rect x="795" y="72" width="150" height="46" rx="9" fill="#e7f0fe" stroke="#2b6cb0"/><text x="870" y="94" font-weight="600">Any device</text><text x="870" y="110" font-size="10">on load</text>
  </g>

  <!-- Part 1 label -->
  <text x="46" y="140" font-size="12" font-weight="700" fill="#177d54">① Scheduled purge (server-side guarantee)</text>

  <g font-size="10.8" fill="#343a40" text-anchor="middle">
    <line x1="90" y1="162" x2="278" y2="162" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="184" y="156">trigger (e.g. hourly)</text>
    <line x1="280" y1="196" x2="478" y2="196" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="379" y="190">select where expires_at &lt; now()</text>
    <line x1="480" y1="230" x2="282" y2="230" stroke="#868e96" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ah)"/><text x="381" y="224" fill="#868e96">expired rows</text>
    <line x1="280" y1="264" x2="668" y2="264" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="474" y="258">delete each expired object</text>
    <line x1="280" y1="298" x2="478" y2="298" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="379" y="292">delete expired rows</text>
  </g>
  <rect x="60" y="316" width="712" height="30" rx="6" fill="#eafaf1" stroke="#3ecf8e"/>
  <text x="416" y="335" text-anchor="middle" font-size="11" fill="#177d54">reclaims storage even if nobody opens the app</text>

  <line x1="30" y1="362" x2="930" y2="362" stroke="#ced4da" stroke-width="1" stroke-dasharray="3 4"/>
  <text x="46" y="382" font-size="12" font-weight="700" fill="#2b6cb0">② Client-side sweep (on load) + UI hides expired</text>

  <g font-size="10.8" fill="#343a40" text-anchor="middle">
    <line x1="870" y1="404" x2="482" y2="404" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="676" y="398">on load: select own items where expires_at &lt; now()</text>
    <line x1="480" y1="438" x2="868" y2="438" stroke="#868e96" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ah)"/><text x="674" y="432" fill="#868e96">expired rows (if any)</text>
    <line x1="870" y1="472" x2="672" y2="472" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="771" y="466">delete objects</text>
    <line x1="870" y1="506" x2="482" y2="506" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="676" y="500">delete rows</text>
  </g>

  <rect x="470" y="524" width="470" height="30" rx="6" fill="#fff8e1" stroke="#f0c96b"/>
  <text x="705" y="543" text-anchor="middle" font-size="11" fill="#7a5b12">same delete path as the manual Delete button; UI hides anything past expires_at</text>
</svg>
