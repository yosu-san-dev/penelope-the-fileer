<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 660" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#495057"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="660" fill="#f7f8fa"/>
  <text x="480" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#1b1f24">Penelope — Architecture (layer map)</text>

  <!-- Browser container -->
  <rect x="28" y="52" width="904" height="410" rx="16" fill="#ffffff" stroke="#adb5bd" stroke-width="2"/>
  <text x="46" y="74" font-size="13" font-weight="700" fill="#495057">Browser — Penelope SPA (client-side only)</text>

  <!-- Presentation band -->
  <rect x="44" y="86" width="872" height="96" rx="10" fill="#eef4ff" stroke="#c7dbff" stroke-width="1.5"/>
  <text x="56" y="104" font-size="12" font-weight="700" fill="#2b6cb0">Presentation layer</text>
  <g font-size="11.5" fill="#1b3a5b" text-anchor="middle">
    <rect x="58" y="112" width="126" height="58" rx="8" fill="#dce9ff" stroke="#2b6cb0"/><text x="121" y="137">App shell</text><text x="121" y="153">layout · toolbar</text>
    <rect x="198" y="112" width="126" height="58" rx="8" fill="#dce9ff" stroke="#2b6cb0"/><text x="261" y="137">Views</text><text x="261" y="153">list / grid</text>
    <rect x="338" y="112" width="126" height="58" rx="8" fill="#dce9ff" stroke="#2b6cb0"/><text x="401" y="137">Item cards</text><text x="401" y="153">note / file</text>
    <rect x="478" y="112" width="152" height="58" rx="8" fill="#dce9ff" stroke="#2b6cb0"/><text x="554" y="137">Editor panel</text><text x="554" y="153">+ Uploader</text>
    <rect x="644" y="112" width="120" height="58" rx="8" fill="#dce9ff" stroke="#2b6cb0"/><text x="704" y="137">Room-code</text><text x="704" y="153">widget</text>
    <rect x="778" y="112" width="122" height="58" rx="8" fill="#dce9ff" stroke="#2b6cb0"/><text x="839" y="137">Countdown</text><text x="839" y="153">per second</text>
  </g>

  <!-- Domain band -->
  <rect x="44" y="198" width="872" height="96" rx="10" fill="#f3effe" stroke="#ddd0fb" stroke-width="1.5"/>
  <text x="56" y="216" font-size="12" font-weight="700" fill="#6c5ce7">Domain / services layer</text>
  <g font-size="11.5" fill="#362b6b" text-anchor="middle">
    <rect x="58" y="224" width="150" height="58" rx="8" fill="#e5dcfb" stroke="#6c5ce7"/><text x="133" y="249">Auth</text><text x="133" y="265">room code</text>
    <rect x="222" y="224" width="168" height="58" rx="8" fill="#e5dcfb" stroke="#6c5ce7"/><text x="306" y="249">Items</text><text x="306" y="265">create·list·update·delete</text>
    <rect x="404" y="224" width="150" height="58" rx="8" fill="#e5dcfb" stroke="#6c5ce7"/><text x="479" y="249">Upload</text><text x="479" y="265">files</text>
    <rect x="568" y="224" width="164" height="58" rx="8" fill="#e5dcfb" stroke="#6c5ce7"/><text x="650" y="249">Expiry</text><text x="650" y="265">sweep + filter</text>
    <rect x="746" y="224" width="154" height="58" rx="8" fill="#e5dcfb" stroke="#6c5ce7"/><text x="823" y="249">Sort / filter</text><text x="823" y="265">order the set</text>
  </g>

  <!-- Data-access band -->
  <rect x="44" y="310" width="872" height="96" rx="10" fill="#fff6e9" stroke="#ffe4bf" stroke-width="1.5"/>
  <text x="56" y="328" font-size="12" font-weight="700" fill="#c2792b">Data-access layer</text>
  <g font-size="12" fill="#7a4a13" text-anchor="middle">
    <rect x="58" y="336" width="470" height="58" rx="8" fill="#ffe9c9" stroke="#c2792b"/><text x="293" y="361" font-weight="600">Supabase JS client (anon key)</text><text x="293" y="379" font-size="11">single door to the backend — all SQL + storage calls</text>
    <rect x="560" y="336" width="340" height="58" rx="8" fill="#ffe9c9" stroke="#c2792b"/><text x="730" y="361" font-weight="600">localStorage</text><text x="730" y="379" font-size="11">room code ONLY (never the item list)</text>
  </g>

  <!-- Supabase band -->
  <rect x="28" y="488" width="904" height="150" rx="16" fill="#eafaf1" stroke="#3ecf8e" stroke-width="2"/>
  <text x="46" y="510" font-size="13" font-weight="700" fill="#177d54">Supabase (managed — no server of mine)</text>
  <g font-size="12" fill="#14532d" text-anchor="middle">
    <rect x="52" y="522" width="196" height="98" rx="10" fill="#ffffff" stroke="#2f9e6f"/><text x="150" y="565" font-weight="600">Postgres</text><text x="150" y="583" font-size="11">items table</text>
    <rect x="268" y="522" width="196" height="98" rx="10" fill="#ffffff" stroke="#2f9e6f"/><text x="366" y="565" font-weight="600">Storage</text><text x="366" y="583" font-size="11">file bytes</text>
    <rect x="484" y="522" width="196" height="98" rx="10" fill="#ffffff" stroke="#2f9e6f"/><text x="582" y="565" font-weight="600">Row-Level Security</text><text x="582" y="583" font-size="11">enforces room code</text>
    <rect x="700" y="522" width="208" height="98" rx="10" fill="#f4fbf7" stroke="#2f9e6f"/><text x="804" y="558" font-weight="600">pg_cron + Edge Fn</text><text x="804" y="576" font-size="11">scheduled purge</text>
  </g>

  <!-- Flow arrows -->
  <line x1="480" y1="182" x2="480" y2="197" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/>
  <text x="490" y="194" font-size="10.5" fill="#495057">renders from</text>
  <line x1="480" y1="294" x2="480" y2="309" stroke="#495057" stroke-width="2" marker-end="url(#ah)"/>
  <text x="490" y="306" font-size="10.5" fill="#495057">calls</text>

  <line x1="200" y1="394" x2="150" y2="520" stroke="#2f9e6f" stroke-width="1.8" marker-end="url(#ah)"/>
  <text x="150" y="470" font-size="10.5" fill="#177d54">SQL</text>
  <line x1="320" y1="394" x2="360" y2="520" stroke="#2f9e6f" stroke-width="1.8" marker-end="url(#ah)"/>
  <text x="352" y="470" font-size="10.5" fill="#177d54">objects</text>

  <!-- purge arrows (cron up to DB/Store) -->
  <path d="M760,522 L200,622 M760,522 Q470,650 240,624" fill="none" stroke="none"/>
  <line x1="740" y1="522" x2="250" y2="600" stroke="#2f9e6f" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ah)"/>
  <line x1="760" y1="522" x2="430" y2="600" stroke="#2f9e6f" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ah)"/>
  <text x="560" y="616" font-size="10" fill="#177d54">purge expired rows + objects</text>
</svg>
