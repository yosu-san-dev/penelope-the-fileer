<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#495057"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="520" fill="#f7f8fa"/>
  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1b1f24">Flow 1 — Share text (create a note)</text>

  <!-- lifelines -->
  <g stroke="#c3c8cf" stroke-width="1.3" stroke-dasharray="4 4">
    <line x1="90" y1="118" x2="90" y2="488"/>
    <line x1="280" y1="118" x2="280" y2="488"/>
    <line x1="470" y1="118" x2="470" y2="488"/>
    <line x1="660" y1="118" x2="660" y2="488"/>
    <line x1="858" y1="118" x2="858" y2="488"/>
  </g>

  <!-- participant heads -->
  <g font-size="12" text-anchor="middle" fill="#1b1f24">
    <rect x="40" y="72" width="100" height="46" rx="9" fill="#fde7cf" stroke="#c2792b"/><text x="90" y="100" font-weight="600">👤 User</text>
    <rect x="205" y="72" width="150" height="46" rx="9" fill="#e7f0fe" stroke="#2b6cb0"/><text x="280" y="100" font-weight="600">UI (text area)</text>
    <rect x="395" y="72" width="150" height="46" rx="9" fill="#e5dcfb" stroke="#6c5ce7"/><text x="470" y="100" font-weight="600">Items service</text>
    <rect x="585" y="72" width="150" height="46" rx="9" fill="#ffe9c9" stroke="#c2792b"/><text x="660" y="100" font-weight="600">Supabase client</text>
    <rect x="783" y="72" width="150" height="46" rx="9" fill="#d7f5e7" stroke="#2f9e6f"/><text x="858" y="100" font-weight="600">Postgres (items)</text>
  </g>

  <!-- messages -->
  <g font-size="11" fill="#343a40" text-anchor="middle">
    <line x1="90" y1="152" x2="278" y2="152" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="184" y="146">paste text, click “Share”</text>
    <line x1="280" y1="194" x2="468" y2="194" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="374" y="188">shareText(title, body)</text>

    <!-- self loop on Items -->
    <path d="M470,224 h70 v20 h-68" fill="none" stroke="#495057" stroke-width="1.6" marker-end="url(#ah)"/>
    <text x="548" y="230" text-anchor="start" font-size="10.5">set created_at, expires_at (+24h)</text>

    <line x1="470" y1="286" x2="658" y2="286" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="564" y="280" font-size="10.5">insert row {code, type:'text', title, content, ts}</text>
    <line x1="660" y1="326" x2="856" y2="326" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="758" y="320">INSERT (RLS checks code)</text>

    <line x1="858" y1="366" x2="662" y2="366" stroke="#868e96" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ah)"/><text x="760" y="360" fill="#868e96">new row</text>
    <line x1="660" y1="404" x2="472" y2="404" stroke="#868e96" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ah)"/><text x="566" y="398" fill="#868e96">ok</text>
  </g>

  <!-- note -->
  <rect x="212" y="440" width="634" height="36" rx="6" fill="#fff8e1" stroke="#f0c96b"/>
  <text x="529" y="463" text-anchor="middle" font-size="11.5" fill="#7a5b12">realtime subscription pushes the new row → UI re-renders the list (DB-driven)</text>
</svg>
