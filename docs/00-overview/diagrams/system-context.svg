<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#495057"/>
    </marker>
    <marker id="ahs" markerWidth="9" markerHeight="9" refX="0.5" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M8,0 L0,3 L8,6 Z" fill="#495057"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="960" height="520" fill="#f7f8fa"/>
  <text x="480" y="36" text-anchor="middle" font-size="21" font-weight="700" fill="#1b1f24">Penelope The Fileer — System Context</text>

  <!-- User -->
  <ellipse cx="72" cy="252" rx="58" ry="44" fill="#fde7cf" stroke="#c2792b" stroke-width="2"/>
  <text x="72" y="246" text-anchor="middle" font-size="14" font-weight="600" fill="#7a4a13">👤 User</text>
  <text x="72" y="264" text-anchor="middle" font-size="11" fill="#7a4a13">me + a few friends</text>

  <!-- Devices -->
  <rect x="168" y="176" width="150" height="62" rx="10" fill="#e7f0fe" stroke="#2b6cb0" stroke-width="2"/>
  <text x="243" y="203" text-anchor="middle" font-size="14" font-weight="600" fill="#1b3a5b">📱 Phone</text>
  <text x="243" y="221" text-anchor="middle" font-size="11" fill="#1b3a5b">(browser)</text>

  <rect x="168" y="286" width="150" height="62" rx="10" fill="#e7f0fe" stroke="#2b6cb0" stroke-width="2"/>
  <text x="243" y="313" text-anchor="middle" font-size="14" font-weight="600" fill="#1b3a5b">💻 Laptop</text>
  <text x="243" y="331" text-anchor="middle" font-size="11" fill="#1b3a5b">(browser)</text>

  <!-- GitHub Pages -->
  <rect x="382" y="66" width="196" height="58" rx="10" fill="#ffffff" stroke="#adb5bd" stroke-width="2"/>
  <text x="480" y="90" text-anchor="middle" font-size="13" font-weight="600" fill="#343a40">GitHub Pages</text>
  <text x="480" y="108" text-anchor="middle" font-size="11" fill="#6c757d">static hosting · no data</text>

  <!-- Penelope -->
  <rect x="380" y="208" width="200" height="118" rx="14" fill="#ece9fd" stroke="#6c5ce7" stroke-width="2.5"/>
  <text x="480" y="248" text-anchor="middle" font-size="15" font-weight="700" fill="#362b6b">Penelope The Fileer</text>
  <text x="480" y="270" text-anchor="middle" font-size="12" fill="#4b3f8a">static single-page app</text>
  <text x="480" y="288" text-anchor="middle" font-size="12" fill="#4b3f8a">runs in the browser</text>
  <text x="480" y="306" text-anchor="middle" font-size="11" fill="#6a5fb0">JS · HTML · CSS</text>

  <!-- Supabase container -->
  <rect x="648" y="92" width="286" height="386" rx="16" fill="#eafaf1" stroke="#3ecf8e" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="791" y="118" text-anchor="middle" font-size="14" font-weight="700" fill="#177d54">Supabase (free tier)</text>

  <rect x="678" y="138" width="224" height="60" rx="10" fill="#ffffff" stroke="#2f9e6f" stroke-width="2"/>
  <text x="790" y="163" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">Postgres</text>
  <text x="790" y="181" text-anchor="middle" font-size="11" fill="#2f6b4b">items table (rows)</text>

  <rect x="678" y="232" width="224" height="60" rx="10" fill="#ffffff" stroke="#2f9e6f" stroke-width="2"/>
  <text x="790" y="257" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">Storage</text>
  <text x="790" y="275" text-anchor="middle" font-size="11" fill="#2f6b4b">file bytes (per code)</text>

  <rect x="678" y="332" width="224" height="72" rx="10" fill="#f4fbf7" stroke="#2f9e6f" stroke-width="2"/>
  <text x="790" y="360" text-anchor="middle" font-size="13" font-weight="600" fill="#14532d">Edge Function + pg_cron</text>
  <text x="790" y="380" text-anchor="middle" font-size="11" fill="#2f6b4b">scheduled purge</text>

  <!-- Arrows: user -> devices -->
  <line x1="126" y1="232" x2="164" y2="210" stroke="#495057" stroke-width="1.6" marker-end="url(#ah)"/>
  <line x1="126" y1="272" x2="164" y2="312" stroke="#495057" stroke-width="1.6" marker-end="url(#ah)"/>

  <!-- devices <-> penelope -->
  <line x1="320" y1="205" x2="376" y2="238" stroke="#495057" stroke-width="1.8" marker-end="url(#ah)" marker-start="url(#ahs)"/>
  <line x1="320" y1="319" x2="376" y2="296" stroke="#495057" stroke-width="1.8" marker-end="url(#ah)" marker-start="url(#ahs)"/>
  <text x="330" y="255" font-size="10.5" fill="#495057">read / write</text>
  <text x="322" y="285" font-size="10.5" fill="#495057">(scoped by code)</text>

  <!-- github serves penelope -->
  <line x1="480" y1="126" x2="480" y2="206" stroke="#868e96" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="490" y="170" font-size="10.5" fill="#868e96">serves app</text>

  <!-- penelope <-> DB / Store -->
  <line x1="582" y1="245" x2="676" y2="172" stroke="#495057" stroke-width="1.8" marker-end="url(#ah)" marker-start="url(#ahs)"/>
  <text x="588" y="200" font-size="10.5" fill="#495057">SQL (anon key)</text>
  <line x1="582" y1="278" x2="676" y2="262" stroke="#495057" stroke-width="1.8" marker-end="url(#ah)" marker-start="url(#ahs)"/>
  <text x="590" y="292" font-size="10.5" fill="#495057">files</text>

  <!-- edge purges DB and Store -->
  <path d="M700,332 L700,200" fill="none" stroke="#2f9e6f" stroke-width="1.6" marker-end="url(#ah)"/>
  <path d="M868,332 L868,294" fill="none" stroke="#2f9e6f" stroke-width="1.6" marker-end="url(#ah)"/>
  <text x="706" y="322" font-size="10" fill="#177d54">delete expired</text>
</svg>
