<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 500" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#495057"/></marker>
  </defs>
  <rect x="0" y="0" width="960" height="500" fill="#f7f8fa"/>
  <text x="480" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1b1f24">Flow 2 — Upload a file</text>

  <g stroke="#c3c8cf" stroke-width="1.3" stroke-dasharray="4 4">
    <line x1="75" y1="120" x2="75" y2="470"/>
    <line x1="235" y1="120" x2="235" y2="470"/>
    <line x1="405" y1="120" x2="405" y2="470"/>
    <line x1="575" y1="120" x2="575" y2="470"/>
    <line x1="740" y1="120" x2="740" y2="470"/>
    <line x1="892" y1="120" x2="892" y2="470"/>
  </g>

  <g font-size="11.5" text-anchor="middle" fill="#1b1f24">
    <rect x="30" y="74" width="90" height="46" rx="9" fill="#fde7cf" stroke="#c2792b"/><text x="75" y="102" font-weight="600">👤 User</text>
    <rect x="160" y="74" width="150" height="46" rx="9" fill="#e7f0fe" stroke="#2b6cb0"/><text x="235" y="96" font-weight="600">Uploader</text><text x="235" y="112" font-size="10">drop / picker</text>
    <rect x="335" y="74" width="140" height="46" rx="9" fill="#e5dcfb" stroke="#6c5ce7"/><text x="405" y="102" font-weight="600">Upload service</text>
    <rect x="500" y="74" width="150" height="46" rx="9" fill="#d7f5e7" stroke="#2f9e6f"/><text x="575" y="102" font-weight="600">Supabase Storage</text>
    <rect x="675" y="74" width="130" height="46" rx="9" fill="#e5dcfb" stroke="#6c5ce7"/><text x="740" y="102" font-weight="600">Items service</text>
    <rect x="827" y="74" width="130" height="46" rx="9" fill="#d7f5e7" stroke="#2f9e6f"/><text x="892" y="102" font-weight="600">Postgres</text>
  </g>

  <g font-size="10.5" fill="#343a40" text-anchor="middle">
    <line x1="75" y1="154" x2="233" y2="154" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="154" y="148">drop / choose file</text>
    <line x1="235" y1="192" x2="403" y2="192" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="319" y="186">uploadFile(file)</text>
    <line x1="405" y1="230" x2="573" y2="230" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="489" y="224">put bytes at &lt;code&gt;/&lt;id&gt;-&lt;name&gt;</text>
    <line x1="575" y1="268" x2="407" y2="268" stroke="#868e96" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ah)"/><text x="491" y="262" fill="#868e96">object path / public URL</text>
    <line x1="405" y1="308" x2="738" y2="308" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="571" y="302">create row {type:'file', title, file_url, size, mime, ts}</text>
    <line x1="740" y1="346" x2="890" y2="346" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/><text x="815" y="340">INSERT (RLS)</text>
    <line x1="892" y1="384" x2="742" y2="384" stroke="#868e96" stroke-width="1.4" stroke-dasharray="5 3" marker-end="url(#ah)"/><text x="817" y="378" fill="#868e96">new row</text>
  </g>

  <rect x="180" y="418" width="600" height="36" rx="6" fill="#fff8e1" stroke="#f0c96b"/>
  <text x="480" y="441" text-anchor="middle" font-size="11.5" fill="#7a5b12">realtime pushes the row → the file appears in the list like a note (bytes + metadata created together)</text>
</svg>
