<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#495057"/></marker>
  </defs>
  <rect x="0" y="0" width="760" height="400" fill="#f7f8fa"/>
  <text x="380" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#1b1f24">Realtime sync</text>

  <g stroke="#c3c8cf" stroke-width="1.3" stroke-dasharray="4 4">
    <line x1="130" y1="96" x2="130" y2="370"/>
    <line x1="380" y1="96" x2="380" y2="370"/>
    <line x1="630" y1="96" x2="630" y2="370"/>
  </g>

  <g font-size="12.5" text-anchor="middle" fill="#1b1f24">
    <rect x="70" y="52" width="120" height="44" rx="9" fill="#e7f0fe" stroke="#2b6cb0"/><text x="130" y="79" font-weight="600">UI</text>
    <rect x="305" y="52" width="150" height="44" rx="9" fill="#e5dcfb" stroke="#6c5ce7"/><text x="380" y="79" font-weight="600">db.js (Items)</text>
    <rect x="550" y="52" width="160" height="44" rx="9" fill="#d7f5e7" stroke="#2f9e6f"/><text x="630" y="79" font-weight="600">Supabase Realtime</text>
  </g>

  <g font-size="11" fill="#343a40" text-anchor="middle">
    <line x1="130" y1="130" x2="378" y2="130" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/>
    <text x="254" y="124">subscribeItems(onChange)</text>
    <line x1="380" y1="172" x2="628" y2="172" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/>
    <text x="504" y="166">channel('items').on(postgres_changes,</text>
    <text x="504" y="180" font-size="10">filter: code=eq.CODE)</text>
  </g>

  <rect x="470" y="208" width="270" height="34" rx="6" fill="#fff8e1" stroke="#f0c96b"/>
  <text x="605" y="230" text-anchor="middle" font-size="10.8" fill="#7a5b12">INSERT / UPDATE / DELETE on items (this code)</text>

  <g font-size="11" fill="#343a40" text-anchor="middle">
    <line x1="630" y1="268" x2="382" y2="268" stroke="#868e96" stroke-width="1.5" stroke-dasharray="5 3" marker-end="url(#ah)"/>
    <text x="506" y="262" fill="#868e96">change event</text>
    <line x1="380" y1="312" x2="132" y2="312" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/>
    <text x="256" y="306">onChange(newItemSet)</text>
  </g>

  <rect x="60" y="336" width="360" height="30" rx="6" fill="#eef4ff" stroke="#c7dbff"/>
  <text x="240" y="355" text-anchor="middle" font-size="11" fill="#2b6cb0">UI re-renders list / grid from the fresh set</text>
</svg>
