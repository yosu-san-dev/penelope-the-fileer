<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 520" font-family="Segoe UI, Arial, sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7.5" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L8,3 L0,6 Z" fill="#495057"/></marker>
  </defs>
  <rect x="0" y="0" width="600" height="520" fill="#f7f8fa"/>
  <text x="300" y="26" text-anchor="middle" font-size="16" font-weight="700" fill="#1b1f24">Room-code resolution (on startup)</text>

  <!-- A -->
  <rect x="220" y="40" width="160" height="42" rx="21" fill="#ece9fd" stroke="#6c5ce7" stroke-width="2"/>
  <text x="300" y="66" text-anchor="middle" font-size="13" fill="#362b6b">App loads</text>

  <!-- B diamond -->
  <polygon points="300,96 415,140 300,184 185,140" fill="#fff3d6" stroke="#c99a2b" stroke-width="2"/>
  <text x="300" y="136" text-anchor="middle" font-size="12" fill="#7a5b12">code in</text>
  <text x="300" y="152" text-anchor="middle" font-size="12" fill="#7a5b12">localStorage?</text>

  <!-- C use existing -->
  <rect x="398" y="196" width="170" height="50" rx="9" fill="#e7f0fe" stroke="#2b6cb0" stroke-width="2"/>
  <text x="483" y="226" text-anchor="middle" font-size="12.5" fill="#1b3a5b">use existing code</text>

  <!-- D generate -->
  <rect x="28" y="196" width="210" height="50" rx="9" fill="#e5dcfb" stroke="#6c5ce7" stroke-width="2"/>
  <text x="133" y="220" text-anchor="middle" font-size="12.5" fill="#362b6b">generateRoomCode()</text>
  <text x="133" y="236" text-anchor="middle" font-size="11" fill="#4b3f8a">8 chars [A-Z0-9]</text>

  <!-- E save -->
  <rect x="28" y="286" width="210" height="50" rx="9" fill="#ffe9c9" stroke="#c2792b" stroke-width="2"/>
  <text x="133" y="316" text-anchor="middle" font-size="12.5" fill="#7a4a13">save to localStorage</text>

  <!-- F scope -->
  <rect x="140" y="386" width="320" height="52" rx="9" fill="#eef4ff" stroke="#2b6cb0" stroke-width="2"/>
  <text x="300" y="410" text-anchor="middle" font-size="12.5" fill="#1b3a5b">scope Supabase client +</text>
  <text x="300" y="427" text-anchor="middle" font-size="12.5" fill="#1b3a5b">all queries to the code</text>

  <!-- G ready -->
  <rect x="220" y="464" width="160" height="42" rx="21" fill="#eafaf1" stroke="#3ecf8e" stroke-width="2"/>
  <text x="300" y="490" text-anchor="middle" font-size="13" fill="#177d54">app ready</text>

  <!-- arrows -->
  <line x1="300" y1="82" x2="300" y2="94" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/>
  <path d="M405,150 Q470,170 483,194" fill="none" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/>
  <text x="452" y="176" font-size="11" fill="#2f9e6f" font-weight="600">yes</text>
  <path d="M195,150 Q120,170 133,194" fill="none" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/>
  <text x="120" y="176" font-size="11" fill="#c0392b" font-weight="600">no</text>

  <line x1="133" y1="246" x2="133" y2="284" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/>
  <path d="M133,336 L133,412 L138,412" fill="none" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/>
  <path d="M483,246 L483,412 L462,412" fill="none" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/>
  <line x1="300" y1="438" x2="300" y2="462" stroke="#495057" stroke-width="1.7" marker-end="url(#ah)"/>
</svg>
